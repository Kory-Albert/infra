apiVersion: batch/v1
kind: CronJob
metadata:
  name: gasbuddy-scraper
  labels:
    app.kubernetes.io/instance: gasbuddy-scrapper
spec:
  schedule: "00 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: gasbuddy-scraper
            image: registry.local.koryalbert.net/gasbuddyscraper:26.04.12
            env:
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-secrets
                  key: token
            - name: INFLUXDB_ORG
              valueFrom:
                secretKeyRef:
                  name: influxdb-secrets
                  key: org
            - name: INFLUXDB_URL
              valueFrom:
                secretKeyRef:
                  name: influxdb-secrets
                  key: url
            - name: INFLUXDB_BUCKET
              value: "gas_prices"
            - name: STATION_IDS
              value: "177667,14863,74355"  # Replace with your desired station ID
            - name: STATION_NAMES
              value: "Roseville-Costco,Auburn-Speedway,Auburn-Sinclair"
          restartPolicy: OnFailure